<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pothole Mapper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

        /* Top navbar */
        #navbar {
            background: #16213e; padding: 12px 16px;
            border-bottom: 2px solid #e94560;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        #navbar h1 { font-size: 18px; color: #e94560; }
        #upload-btn {
            background: #e94560; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }

        /* Main layout */
        #content { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 260px; min-width: 260px; background: #16213e;
            display: flex; flex-direction: column;
            border-right: 1px solid #0f3460; overflow-y: auto;
        }
        #sessions-header { padding: 12px 16px; font-size: 12px; color: #aaa; border-bottom: 1px solid #0f3460; }
        .session-item {
            padding: 12px 16px; border-bottom: 1px solid #0f3460;
            cursor: pointer;
        }
        .session-item:hover, .session-item.active { background: #0f3460; border-left: 3px solid #e94560; }
        .session-item .name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item .meta { font-size: 12px; color: #aaa; margin-top: 3px; }

        /* Map area */
        #map-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #map { flex: 1; }
        #no-session { flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 16px; flex-direction: column; gap: 10px; }
        #no-session span { font-size: 40px; }

        /* Summary bar */
        #summary-bar {
            background: #16213e; padding: 10px 16px;
            border-top: 1px solid #0f3460;
            display: flex; gap: 16px; flex-wrap: wrap; flex-shrink: 0;
        }
        .summary-item { font-size: 13px; }
        .summary-item b { color: #e94560; }

        /* Upload modal */
        #modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            align-items: center; justify-content: center;
        }
        #modal-overlay.show { display: flex; }
        #modal {
            background: #16213e; border-radius: 12px; padding: 24px;
            width: 90%; max-width: 420px; border: 1px solid #0f3460;
        }
        #modal h2 { margin-bottom: 16px; color: #e94560; }
        #modal input, #modal label {
            display: block; width: 100%; margin-bottom: 12px;
        }
        #modal input {
            padding: 10px; background: #0f3460; border: 1px solid #e94560;
            border-radius: 6px; color: #eee; font-size: 14px;
        }
        #modal label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .modal-row { display: flex; gap: 8px; }
        .modal-row input { flex: 1; }
        #modal-btns { display: flex; gap: 8px; margin-top: 8px; }
        #modal-btns button {
            flex: 1; padding: 10px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px;
        }
        #btn-submit { background: #e94560; color: white; }
        #btn-cancel { background: #0f3460; color: #eee; }
        #progress-wrap { margin-top: 12px; display: none; }
        #progress-bar { height: 6px; background: #0f3460; border-radius: 3px; margin-top: 6px; }
        #progress-fill { height: 100%; background: #e94560; border-radius: 3px; transition: width 0.3s; width: 0%; }
        #progress-text { font-size: 12px; color: #aaa; margin-top: 4px; }

        /* Mobile styles */
        @media (max-width: 600px) {
            #content { flex-direction: column; }
            #sidebar { width: 100%; min-width: unset; max-height: 200px; border-right: none; border-bottom: 1px solid #0f3460; }
            #summary-bar { gap: 10px; padding: 8px 12px; }
            .summary-item { font-size: 12px; }
            #navbar h1 { font-size: 15px; }
        }
    </style>
</head>

<div id="navbar">
    <h1>🕳️ Pothole Mapper</h1>
    <button id="upload-btn" onclick="showModal()">+ New Video</button>
</div>

<div id="content">
    <div id="sidebar">
        <div id="sessions-header">YOUR SESSIONS</div>
        <div id="sessions-list"></div>
    </div>

    <div id="map-area">
        <div id="no-session">
            <span>🗺️</span>
            Upload a dashcam video to get started
        </div>
        <div id="map" style="display:none;"></div>
        <div id="summary-bar" style="display:none;"></div>
    </div>
</div>

<!-- Upload Modal -->
<div id="modal-overlay">
    <div id="modal">
        <h2>Upload Video</h2>
        <label>Session name</label>
        <input type="text" id="video-name" placeholder="e.g. Central UB - Monday">
        <label>Video file</label>
        <input type="file" id="video-file" accept="video/*">
        <label>Manual GPS (optional — if no GPS overlay in video)</label>
        <div class="modal-row">
            <input type="text" id="manual-lat" placeholder="Latitude">
            <input type="text" id="manual-lon" placeholder="Longitude">
        </div>
        <div id="progress-wrap">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="progress-text">Processing...</div>
        </div>
        <div id="modal-btns">
            <button id="btn-cancel" onclick="hideModal()">Cancel</button>
            <button id="btn-submit" onclick="uploadVideo()">Upload & Process</button>

<body>

<div id="navbar">
    <h1>🕳️ Pothole Mapper</h1>
    <button id="upload-btn" onclick="showModal()">+ New Video</button>
</div>

<div id="content">
    <div id="sidebar">
        <div id="sessions-header">YOUR SESSIONS</div>
        <div id="sessions-list"></div>
    </div>

    <div id="map-area">
        <div id="no-session">
            <span>🗺️</span>
            Upload a dashcam video to get started
        </div>
        <div id="map" style="display:none;"></div>
        <div id="summary-bar" style="display:none;"></div>
        <div id="gallery-section" style="display:none;">
            <button onclick="toggleGallery()" style="background:#e94560;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;">
                📷 View Pothole Photos (No GPS)
            </button>
            <div id="gallery-grid"></div>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <h2>Upload Video</h2>
        <label>Session name</label>
        <input type="text" id="video-name" placeholder="e.g. Central UB - Monday">
        <label>Video file</label>
        <input type="file" id="video-file" accept="video/*">
        <label>Manual GPS (optional — if no GPS overlay in video)</label>
        <div class="modal-row">
            <input type="text" id="manual-lat" placeholder="Latitude e.g. 47.90">
            <input type="text" id="manual-lon" placeholder="Longitude e.g. 106.88">
        </div>
        <div id="progress-wrap">
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="progress-text">Processing...</div>
        </div>
        <div id="modal-btns">
            <button id="btn-cancel" onclick="hideModal()">Cancel</button>
            <button id="btn-submit" onclick="uploadVideo()">Upload & Process</button>
        </div>
    </div>
</div>

<script>
let map = null;
let markers = [];

function getSessionId() {
    let sid = localStorage.getItem('pothole_session_id');
    if (!sid) {
        sid = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('pothole_session_id', sid);
    }
    return sid;
}

function showModal() {
    document.getElementById('modal-overlay').classList.add('show');
}

function hideModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('modal-btns').style.display = 'flex';
}

function toggleGallery() {
    const grid = document.getElementById('gallery-grid');
    grid.classList.toggle('open');
    const btn = document.querySelector('#gallery-section button');
    btn.textContent = grid.classList.contains('open') ? '📷 Hide Photos' : btn.textContent;
}

async function loadSessions() {
    const sid = getSessionId();
    const res = await fetch(`/sessions?user_id=${sid}`);
    const sessions = await res.json();
    const container = document.getElementById('sessions-list');
    container.innerHTML = '';
    if (sessions.length === 0) {
        container.innerHTML = '<div style="padding:16px;color:#aaa;font-size:13px;">No sessions yet</div>';
        return;
    }
    sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item';
        div.id = `session-${s.job_id}`;
        div.innerHTML = `
            <div class="name">${s.video_name}</div>
            <div class="meta">🕳️ ${s.pothole_count} potholes</div>
        `;
        div.onclick = () => loadResult(s.job_id, div);
        container.appendChild(div);
    });
}

async function uploadVideo() {
    const file = document.getElementById('video-file').files[0];
    const name = document.getElementById('video-name').value || file?.name || 'Untitled';
    const lat = document.getElementById('manual-lat').value;
    const lon = document.getElementById('manual-lon').value;
    const sid = getSessionId();

    if (!file) { alert('Please select a video file'); return; }

    const formData = new FormData();
    formData.append('video', file);
    formData.append('name', name);
    formData.append('lat', lat);
    formData.append('lon', lon);
    formData.append('user_id', sid);

    document.getElementById('progress-wrap').style.display = 'block';
    document.getElementById('modal-btns').style.display = 'none';
    document.getElementById('progress-text').textContent = 'Uploading...';

    const res = await fetch('/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.error) { alert(data.error); hideModal(); return; }

    pollStatus(data.job_id);
}

async function pollStatus(jobId) {
    const interval = setInterval(async () => {
        const res = await fetch(`/status/${jobId}`);
        const data = await res.json();

        document.getElementById('progress-fill').style.width = data.progress + '%';
        document.getElementById('progress-text').textContent = `Processing... ${data.progress}%`;

        if (data.status === 'done') {
            clearInterval(interval);
            hideModal();
            await loadSessions();
            const item = document.getElementById(`session-${jobId}`);
            await loadResult(jobId, item);
        }
        if (data.status === 'error') {
            clearInterval(interval);
            alert('Processing failed: ' + (data.error || 'Unknown error'));
            hideModal();
        }
    }, 2000);
}

async function loadResult(jobId, element) {
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    if (element) element.classList.add('active');

    const res = await fetch(`/result/${jobId}`);
    const data = await res.json();

    document.getElementById('no-session').style.display = 'none';
    document.getElementById('map').style.display = 'block';
    document.getElementById('summary-bar').style.display = 'flex';

    if (!map) {
        map = L.map('map').setView([47.9, 106.9], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CartoDB'
        }).addTo(map);
    }

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const allPotholes = data.detections.filter(d => d.class === 'pothole');
    const mappedPotholes = allPotholes.filter(d => d.lat && d.lon);
    const unmappedPotholes = allPotholes.filter(d => !d.lat || !d.lon);

    // Map markers for potholes with GPS
    mappedPotholes.forEach(d => {
        const icon = L.divIcon({ html: '🕳️', className: '', iconSize: [24, 24] });
        const marker = L.marker([d.lat, d.lon], { icon })
            .addTo(map)
            .bindPopup(`
                <b>🕳️ Pothole</b><br>
                Confidence: ${Math.round(d.confidence * 100)}%<br>
                Time: ${d.timestamp_s}s<br>
                GPS: ${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}<br>
                ${d.image ? `<img src="data:image/jpeg;base64,${d.image}" width="200" style="margin-top:6px;border-radius:4px;">` : ''}
            `, { maxWidth: 250 });
        markers.push(marker);
    });

    if (mappedPotholes.length > 0) {
        map.setView([mappedPotholes[0].lat, mappedPotholes[0].lon], 15);
    }

    // Gallery for potholes without GPS
    const gallerySection = document.getElementById('gallery-section');
    const galleryGrid = document.getElementById('gallery-grid');
    const galleryBtn = document.querySelector('#gallery-section button');

    if (unmappedPotholes.length > 0) {
        gallerySection.style.display = 'block';
        galleryBtn.textContent = `📷 View ${unmappedPotholes.length} Pothole Photos (No GPS)`;
        galleryGrid.classList.remove('open');
        galleryGrid.innerHTML = unmappedPotholes.filter(d => d.image).map(d => `
            <div class="gallery-item">
                <img src="data:image/jpeg;base64,${d.image}">
                <div class="gallery-meta">Conf: ${Math.round(d.confidence * 100)}% · ${d.timestamp_s}s</div>
            </div>
        `).join('');
    } else {
        gallerySection.style.display = 'none';
        galleryGrid.innerHTML = '';
    }

    // Summary bar
    const icons = { pothole:'🕳️', car:'🚗', person:'🚶', motorcycle:'🏍️', bus:'🚌', truck:'🚛', bicycle:'🚲' };
    const bar = document.getElementById('summary-bar');
    bar.innerHTML = Object.entries(data.summary).map(([cls, count]) =>
        `<div class="summary-item">${icons[cls]||'📍'} ${cls.charAt(0).toUpperCase()+cls.slice(1)}: <b>${count}</b></div>`
    ).join('');
}

loadSessions();
</script>
</body>
</html>
